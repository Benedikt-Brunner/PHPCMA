name: Release

on:
  push:
    tags:
      - 'v*'

permissions:
  contents: write

jobs:
  release:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - uses: mlugg/setup-zig@v2
        with:
          version: 0.15.2

      - name: Get version from tag
        id: version
        run: echo "version=${GITHUB_REF_NAME}" >> "$GITHUB_OUTPUT"

      - name: Cross-compile all targets
        run: zig build dist

      - name: Package binaries
        run: |
          VERSION="${{ steps.version.outputs.version }}"
          DIST_DIR="zig-out/dist"
          OUT_DIR="release-assets"
          mkdir -p "$OUT_DIR"

          declare -A TARGET_MAP=(
            ["x86_64-linux-gnu"]="linux-x86_64"
            ["aarch64-linux-gnu"]="linux-aarch64"
            ["x86_64-macos-none"]="macos-x86_64"
            ["aarch64-macos-none"]="macos-aarch64"
            ["x86_64-windows-gnu"]="windows-x86_64"
          )

          for triple in "${!TARGET_MAP[@]}"; do
            platform="${TARGET_MAP[$triple]}"
            src="$DIST_DIR/$triple/phpcma"
            name="phpcma-${VERSION}-${platform}"

            if [[ "$triple" == *"windows"* ]]; then
              src="${src}.exe"
              name="${name}.exe"
            fi

            if [ -f "$src" ]; then
              cp "$src" "$OUT_DIR/$name"
            else
              echo "WARNING: Binary not found: $src"
            fi
          done

      - name: Generate checksums
        working-directory: release-assets
        run: |
          sha256sum * > checksums-sha256.txt

      - name: Generate changelog
        id: changelog
        run: |
          PREVIOUS_TAG=$(git tag --sort=-v:refname | head -n 2 | tail -n 1)
          if [ -z "$PREVIOUS_TAG" ] || [ "$PREVIOUS_TAG" = "${{ steps.version.outputs.version }}" ]; then
            echo "changelog=Initial release" >> "$GITHUB_OUTPUT"
            echo "Initial release" > changelog.md
          else
            echo "## Changes since ${PREVIOUS_TAG}" > changelog.md
            echo "" >> changelog.md
            git log "${PREVIOUS_TAG}..HEAD" --pretty=format:"- %s (%h)" --no-merges >> changelog.md
          fi

      - name: Create GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          body_path: changelog.md
          files: release-assets/*
          draft: false
          prerelease: ${{ contains(steps.version.outputs.version, '-') }}
